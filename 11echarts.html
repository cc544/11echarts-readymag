<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ECharts</title>
  <!-- 1. 引入 ECharts CDN：无需本地下载，直接加载线上资源 -->
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
  <style>
    /* 2. 消除默认样式+全屏适配：避免 iframe 中出现白边/滚动条 */
    * {margin:0;padding:0;box-sizing:border-box}
    html,body {width:100%;height:100%;overflow:hidden}
    #main {width:100%;height:100%} /* 图表容器占满整个页面 */
  </style>
</head>
<body>
<div id="main"></div> <!-- 3. 图表挂载容器 -->
<script>
// 4. 初始化 ECharts 实例
const chartDom = document.getElementById('main');
const myChart = echarts.init(chartDom);
// 5. 图表配置项（核心：替换这里即可修改图表）
const option = {
  backgroundColor: 'transparent', // 关键：适配 Readymag 透明背景
  xAxis: {type: 'category', data: ['周一','周二','周三','周四','周五','周六','周日']},
  yAxis: {type: 'value'},
  series: [{type: 'bar', data: [120,200,150,80,70,110,130]}]
};
myChart.setOption(option);
// 6. 自适应：iframe 大小变化时，图表自动重绘
window.addEventListener('resize', ()=>myChart.resize())
</script>
</body>
</html>
